apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homework-15-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:antonzhdanko/argocd-homework.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
